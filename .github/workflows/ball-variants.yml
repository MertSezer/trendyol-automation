name: ball-variants-e2e

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ball-variants:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure output directory exists
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force .\output | Out-Null

      - name: Start EdgeDriver
        shell: powershell
        run: |
          Start-Process -FilePath "npx.cmd" -ArgumentList "edgedriver --host=127.0.0.1 --port=4444" -WindowStyle Hidden
          Start-Sleep -Seconds 5
          Test-NetConnection 127.0.0.1 -Port 4444

      - name: Run guarded ball variant tests
        shell: powershell
        env:
          RUN_MODE: e2e
          SELENIUM_HOST: 127.0.0.1
          SELENIUM_PORT: 4444
        run: |
          npm run test:ball-variants:ci

      - name: Upload output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ball-variant-output
          path: output/**
          if-no-files-found: ignore
