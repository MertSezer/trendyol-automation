name: e2e

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  codecept-e2e:
    runs-on: ubuntu-latest

    env:
      RUN_MODE: e2e
      TESTS: tests/e2e/multi_url_add_remove_test.js
      SELENIUM_HOST: localhost
      SELENIUM_PORT: "4444"
      SELENIUM_PATH: "/"
      BASE_URL: https://www.trendyol.com
      CI: "true"
      DEMO_MODE: "1"
      DATASET: datasets/demo.txt
      TOP_COLORS: "3"
      QUALITY_GATE_MIN_OK: "1"
      QUALITY_GATE_MAX_SKIP_PCT: "80"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Start Selenium container
        shell: bash
        run: |
          docker rm -f selenium 2>/dev/null || true
          docker run -d --name selenium -p 4444:4444 --shm-size=2g --ipc=host \
            -e SE_NODE_SESSION_TIMEOUT=300 \
            -e SE_SESSION_REQUEST_TIMEOUT=300 \
            -e SE_SESSION_RETRY_INTERVAL=2 \
            selenium/standalone-chrome:latest
          docker ps -a | sed -n '1,30p'

      - name: Wait Selenium (status)
        shell: bash
        run: |
          echo "Waiting Selenium status endpoint..."
          timeout 240 bash -lc 'until curl -fsS http://localhost:4444/status >/dev/null 2>&1 || curl -fsS http://localhost:4444/wd/hub/status >/dev/null 2>&1; do sleep 2; done'
          echo "Selenium status endpoint OK ✅"

      - name: Prepare dataset
        shell: bash
        run: |
          echo "DATASET=$DATASET"
          ls -la datasets || true
          test -f "$DATASET" || (echo "Dataset file not found: $DATASET" && exit 1)

      - name: Run tests
        shell: bash
        run: npx codeceptjs run --config ./codecept.ci.conf.js --steps --verbose

      - name: Quality Gate
        if: always()
        shell: bash
        run: node ./scripts/quality_gate.js

      - name: Render summary.md
        if: always()
        shell: bash
        run: node ./scripts/render_summary_md.js

      - name: Publish GitHub Job Summary
        if: always()
        shell: bash
        run: |
          echo "## Trendyol E2E Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -f output/quality_gate.json ]; then
            ok=$(node -p "require('./output/quality_gate.json').ok" 2>/dev/null || echo "")
            skip=$(node -p "require('./output/quality_gate.json').skip" 2>/dev/null || echo "")
            total=$(node -p "require('./output/quality_gate.json').total" 2>/dev/null || echo "")
            skipPct=$(node -p "require('./output/quality_gate.json').skipPct" 2>/dev/null || echo "")
            minOk=$(node -p "require('./output/quality_gate.json').minOk" 2>/dev/null || echo "")
            maxSkipPct=$(node -p "require('./output/quality_gate.json').maxSkipPct" 2>/dev/null || echo "")

            echo "**QUALITY_GATE:** PASS ✅" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "- ok: \`$ok\` (min: \`$minOk\`)" >> "$GITHUB_STEP_SUMMARY"
            echo "- skip: \`$skip\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- total: \`$total\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- skipPct: \`$skipPct%\` (max: \`$maxSkipPct%\`)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ -f output/summary.md ]; then
            cat output/summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_summary.md not found_" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload artifacts (output)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output
          path: output
          if-no-files-found: ignore

      - name: Cleanup selenium
        if: always()
        shell: bash
        run: |
          docker logs selenium --tail 200 || true
          docker rm -f selenium || true