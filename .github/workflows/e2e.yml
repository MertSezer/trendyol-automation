name: e2e

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  codecept-e2e:
    runs-on: ubuntu-latest

    env:
      RUN_MODE: e2e
      TESTS: tests/e2e/multi_url_add_remove_test.js
      SELENIUM_HOST: localhost
      SELENIUM_PORT: "4444"
      SELENIUM_PATH: "/"
      BASE_URL: https://www.trendyol.com
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Start Selenium container
        shell: bash
        run: |
          docker rm -f selenium 2>/dev/null || true
          docker run -d --name selenium -p 4444:4444 --shm-size=2g --ipc=host \
            -e SE_NODE_MAX_SESSIONS=2 \
            -e SE_NODE_OVERRIDE_MAX_SESSIONS=true \
            -e SE_NODE_SESSION_TIMEOUT=300 \
            -e SE_SESSION_REQUEST_TIMEOUT=300 \
            -e SE_SESSION_RETRY_INTERVAL=2 \
            selenium/standalone-chrome:latest
          docker ps -a | sed -n '1,30p'

      - name: Wait Selenium (status + session preflight + close)
        shell: bash
        run: |
          echo "Waiting Selenium status endpoint..."
          timeout 240 bash -lc 'until curl -fsS http://localhost:4444/status >/dev/null 2>&1 || curl -fsS http://localhost:4444/wd/hub/status >/dev/null 2>&1; do sleep 2; done'

          echo "Preflight: create session (3 attempts) then close it"
          ok=0
          for i in 1 2 3; do
            echo "Attempt $i..."
            if curl -fsS -X POST http://localhost:4444/session -H "Content-Type: application/json" \
              --data "{\"capabilities\":{\"alwaysMatch\":{\"browserName\":\"chrome\",\"goog:chromeOptions\":{\"args\":[\"--headless=new\",\"--no-sandbox\",\"--disable-dev-shm-usage\",\"--disable-gpu\",\"--remote-debugging-pipe\"]}}}}" \
              >/tmp/session.json; then

              cat /tmp/session.json || true

              # HEREDOC YOK: tek satır python -c ile sessionId al
              sid=$(python3 -c "import json; d=json.load(open('/tmp/session.json','r',encoding='utf-8')); print(d.get('sessionId') or d.get('value',{}).get('sessionId') or '')" 2>/dev/null || true)
              if [ -n "$sid" ]; then
                echo "Closing preflight session: $sid"
                curl -fsS -X DELETE "http://localhost:4444/session/$sid" >/dev/null || true
              else
                echo "WARN: could not parse session id"
              fi

              ok=1
              break
            fi
            sleep 3
          done

          if [ "$ok" != "1" ]; then
            echo "Could not create session via /session"
            docker logs selenium --tail 200 || true
            exit 1
          fi

          echo "Selenium ready for sessions ✅"

      - name: Prepare products.txt
        shell: bash
        run: |
          if [ ! -f "products.txt" ] && [ -f "products.example.txt" ]; then
            cp products.example.txt products.txt
          fi
          ls -la products*.txt || true

      - name: Run tests
        shell: bash
        run: npx codeceptjs run --config ./codecept.ci.conf.js --steps --verbose

      - name: Upload artifacts (output)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output
          path: output
          if-no-files-found: ignore

      - name: Cleanup selenium
        if: always()
        shell: bash
        run: |
          docker logs selenium --tail 200 || true
          docker rm -f selenium || true