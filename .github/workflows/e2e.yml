name: e2e

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  codecept-e2e:
    runs-on: ubuntu-latest

    env:
      RUN_MODE: e2e
      TESTS: tests/e2e/multi_url_add_remove_test.js
      SELENIUM_HOST: localhost
      SELENIUM_PORT: "4444"
      SELENIUM_PATH: "/"
      BASE_URL: https://www.trendyol.com
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Start Selenium container
        shell: bash
        run: |
          docker run -d --name selenium -p 4444:4444 --shm-size=2g --privileged --ipc=host selenium/standalone-chrome:latest
          docker ps -a | sed -n '1,10p'

      - name: Wait Selenium
        shell: bash
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:4444/status >/dev/null; then
              echo "Selenium OK (/status)"
              exit 0
            fi
            if curl -sSf http://localhost:4444/wd/hub/status >/dev/null; then
              echo "Selenium OK (/wd/hub/status)"
              exit 0
            fi
            sleep 2
          done
          echo "Selenium did not become ready"
          docker logs selenium --tail 200 || true
          exit 1

      - name: Prepare products.txt
        shell: bash
        run: |
          if [ ! -f "products.txt" ] && [ -f "products.example.txt" ]; then
            cp products.example.txt products.txt
          fi
          ls -la products*.txt || true

      - name: Selenium preflight
        shell: bash
        run: |
          echo "== /status =="
          curl -s http://localhost:4444/status || true
          echo ""
          echo "== /wd/hub/status =="
          curl -s http://localhost:4444/wd/hub/status || true
          echo ""
          echo "== try create session =="
          curl -s -X POST "http://localhost:4444/session" -H "Content-Type: application/json" --data '{"capabilities":{"alwaysMatch":{"browserName":"chrome","goog:chromeOptions":{"args":["--headless=new","--no-sandbox","--disable-dev-shm-usage"]}}}}' || true
          echo ""

      - name: Run tests
        shell: bash
        run: npx codeceptjs run --config ./codecept.ci.conf.js --steps --verbose

      - name: Publish summary to Job Summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Test Summary"
            if [ -f "output/summary.md" ]; then
              cat output/summary.md
            else
              echo "No output/summary.md found"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload artifacts (output)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output
          path: output
          if-no-files-found: ignore

      - name: Cleanup selenium
        if: always()
        shell: bash
        run: |
          docker logs selenium --tail 200 || true
          docker rm -f selenium || true


