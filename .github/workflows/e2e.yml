name: e2e

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  codecept-e2e:
    runs-on: ubuntu-latest

    env:
      RUN_MODE: e2e
      TESTS: tests/e2e/multi_url_add_remove_test.js
      SELENIUM_HOST: localhost
      SELENIUM_PORT: "4444"
      SELENIUM_PATH: "/"
      BASE_URL: https://www.trendyol.com
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Start Selenium container
        shell: bash
        run: |
          docker rm -f selenium 2>/dev/null || true
          docker run -d --name selenium -p 4444:4444 --shm-size=2g --ipc=host -e SE_NODE_SESSION_TIMEOUT=300 -e SE_SESSION_REQUEST_TIMEOUT=300 -e SE_SESSION_RETRY_INTERVAL=2 selenium/standalone-chrome:latest
          docker ps -a | sed -n '1,30p'

            - name: Wait Selenium
        shell: bash
        run: |
          echo "Waiting Selenium HTTP 200..."
          if ! timeout 240 bash -lc 'until curl -fsS http://localhost:4444/status >/dev/null 2>&1 || curl -fsS http://localhost:4444/wd/hub/status >/dev/null 2>&1; do sleep 2; done'; then
            echo "Selenium status endpoint not reachable"
            docker logs selenium --tail 200 || true
            exit 1
          fi
          echo "Selenium status reachable"

          echo "Preflight: try create session (up to 3 attempts)"
          cat > /tmp/payload.json <<'JSON'
          {"capabilities":{"alwaysMatch":{"browserName":"chrome","goog:chromeOptions":{"args":["--headless=new","--no-sandbox","--disable-dev-shm-usage","--disable-gpu","--remote-debugging-pipe"]}}}}
          JSON

          ok=0
          for i in 1 2 3; do
            echo "Attempt ..."
            if curl -fsS -X POST http://localhost:4444/session -H "Content-Type: application/json" --data @/tmp/payload.json >/tmp/session.json; then
              cat /tmp/session.json || true
              ok=1
              break
            fi
            sleep 3
          done

          if [ "" != "1" ]; then
            echo "Could not create session via /session"
            docker logs selenium --tail 200 || true
            exit 1
          fi

          echo "Selenium ready for sessions ✅"

      - name: Prepare products.txt
        shell: bash
        run: |
          if [ ! -f "products.txt" ] && [ -f "products.example.txt" ]; then
            cp products.example.txt products.txt
          fi
          ls -la products*.txt || true

      - name: Run tests
        shell: bash
        run: npx codeceptjs run --config ./codecept.ci.conf.js --steps --verbose

      - name: Upload artifacts (output)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output
          path: output
          if-no-files-found: ignore

      - name: Cleanup selenium
        if: always()
        shell: bash
        run: |
          docker logs selenium --tail 200 || true
          docker rm -f selenium || true
