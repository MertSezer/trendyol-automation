name: e2e

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  codecept-e2e:
    runs-on: ubuntu-latest

    services:
      selenium:
        image: selenium/standalone-chrome:latest
        ports:
          - 4444:4444
        options: >-
          --shm-size=2g --privileged --ipc=host

    env:
      RUN_MODE: e2e
      TESTS: tests/e2e/multi_url_add_remove_test.js
      SELENIUM_HOST: localhost
      SELENIUM_PORT: "4444"
      CI: "true"
      SELENIUM_PATH: ""
      BASE_URL: https://www.trendyol.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Wait Selenium
        shell: bash
        run: |
          for i in {1..60}; do
            if curl -sSf http://localhost:4444/status >/dev/null; then
              echo "Selenium OK (/status)"
              exit 0
            fi
            if curl -sSf http://localhost:4444/wd/hub/status >/dev/null; then
              echo "Selenium OK (/wd/hub/status)"
              exit 0
            fi
            sleep 2
          done
          echo "Selenium did not become ready"
          exit 1


      - name: Prepare products.txt
        run: |
          if [ ! -f "products.txt" ] && [ -f "products.example.txt" ]; then
            cp products.example.txt products.txt
          fi
          ls -la products*.txt || true

      - name: Selenium preflight
        shell: bash
        run: |
          echo "== /status =="
          curl -s http://localhost:4444/status || true
          echo ""
          echo "== /wd/hub/status =="
          curl -s http://localhost:4444/wd/hub/status || true
          echo ""
          echo "== try create session =="
          cat > /tmp/payload.json <<'JSON'
          {
            "capabilities": {
              "alwaysMatch": {
                "browserName": "chrome",
                "goog:chromeOptions": {
                  "args": ["--headless=new","--no-sandbox","--disable-dev-shm-usage"]
                }
              }
            }
          }
JSON
          curl -s -X POST http://localhost:4444/session -H "Content-Type: application/json" --data @/tmp/payload.json || true
          echo ""

      - name: Run tests
        run: npx codeceptjs run --config ./codecept.ci.conf.js --steps --verbose


      - name: Publish summary to Job Summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Test Summary"
            if [ -f "output/summary.md" ]; then
              cat output/summary.md
            else
              echo "No output/summary.md found"
            fi
          } >> "\"

      - name: Upload artifacts (output)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output
          path: output











